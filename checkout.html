<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | LACED</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="LACED Logo" class="logo-img">
            </a>
        </div>
        <div class="nav-right">
            <button class="icon-btn" aria-label="Search">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button class="icon-btn cart-icon-btn" aria-label="Cart" id="navCartBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="cart-badge" id="cartBadge">0</span>
            </button>
            <button class="menu-btn" aria-label="Menu">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </button>
        </div>
    </nav>

    <main class="checkout-page">
        <div class="checkout-container">
            <div class="checkout-form-section">
                <h2>Shipping Information</h2>
                <form id="checkoutForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" required>
                    </div>
                    <div class="form-group">
                        <label>Delivery Address</label>
                        <textarea rows="3" required></textarea>
                    </div>
                    
                    <h2 class="mt-2">Payment Method</h2>
                    <div class="payment-options">
                        <label class="payment-option">
                            <input type="radio" name="payment" value="cod" checked>
                            <span>Cash on Delivery</span>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="bkash">
                            <span>bKash</span>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="nagad">
                            <span>Nagad</span>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn-pill checkout-submit-btn">Place Order</button>
                </form>
            </div>
            
            <div class="order-summary-section">
                <h2>Order Summary</h2>
                <div id="checkoutItems" class="checkout-items"></div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="checkoutTotal">Tk 0</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 LACED. All rights reserved.</p>
    </footer>

    <!-- Cart Overlay & Drawer -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-cart" id="closeCartBtn">&times;</button>
        </div>
        <div class="cart-items" id="cartItemsContainer"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotalAmount">Tk 0</span>
            </div>
            <a href="checkout.html" class="btn-pill checkout-btn" id="checkoutBtn">Proceed to Checkout</a>
        </div>
    </div>

    <script src="cart.js"></script>
    <script type="module" src="checkout-page.js"></script>
    <script>
        const checkoutItemsContainer = document.getElementById('checkoutItems');
        const checkoutTotal = document.getElementById('checkoutTotal');
        
        function renderCheckout() {
            checkoutItemsContainer.innerHTML = '';
            if(cart.length === 0) {
                checkoutItemsContainer.innerHTML = '<p>Your cart is empty.</p>';
            } else {
                cart.forEach(item => {
                    checkoutItemsContainer.innerHTML += `
                        <div class="checkout-item">
                            <img src="${item.image}" alt="${item.name}" class="checkout-img">
                            <div class="checkout-info">
                                <h4>${item.name}</h4>
                                <p>Size: ${item.size} | Color: <span style="display:inline-block;width:12px;height:12px;background:${item.color};border-radius:50%;border:1px solid #ccc;vertical-align:middle;"></span></p>
                                <p>Qty: ${item.quantity}</p>
                            </div>
                            <div class="checkout-price">${formatPrice(item.price * item.quantity)}</div>
                        </div>
                    `;
                });
            }
            checkoutTotal.textContent = formatPrice(getCartTotal());
        }

        document.addEventListener('DOMContentLoaded', renderCheckout);
    </script>
</body>
</html>
