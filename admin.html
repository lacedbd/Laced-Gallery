<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LACED Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- GITHUB LOGIN SCREEN -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h2>Admin Login</h2>
            <p style="margin-bottom: 20px; font-size: 0.9rem; color: #666;">Enter your GitHub Personal Access Token to securely manage your store data.</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>GitHub Personal Access Token (PAT)</label>
                    <input type="password" id="githubToken" required placeholder="ghp_...">
                </div>
                <button type="submit" id="loginBtn" class="btn-primary">Connect to GitHub</button>
                <p id="loginError" class="error-msg"></p>
            </form>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard" class="dashboard-layout hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>LACED Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active" data-tab="products">Products</button>
                <button class="nav-btn" data-tab="settings">Settings</button>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="nav-btn" style="color: #ff4444;">Disconnect</button>
            </div>
        </aside>

        <!-- Content Area -->
        <main class="main-content">
            
            <!-- PRODUCTS TAB -->
            <section id="productsTab" class="tab-content">
                <div class="header-flex">
                    <h2>Manage Products</h2>
                    <button id="openAddProductBtn" class="btn-primary">+ Add Product</button>
                </div>
                
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Product Details</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- SETTINGS TAB -->
            <section id="settingsTab" class="tab-content hidden">
                <h2>Homepage Settings</h2>
                <form id="settingsForm" class="settings-form">
                    <div class="form-group">
                        <label>Hero Headline</label>
                        <input type="text" id="heroHeadline" required>
                    </div>
                    <div class="form-group">
                        <label>Hero Subtext</label>
                        <input type="text" id="heroSubtext" required>
                    </div>
                    <div class="form-group">
                        <label>Hero Image Upload (Optional)</label>
                        <input type="file" id="heroImageInput" accept="image/*">
                        <small>Leave blank to keep existing image</small>
                    </div>
                    
                    <hr>

                    <div class="form-group row-group">
                        <label>Enable Promo Bar</label>
                        <input type="checkbox" id="promoEnabled">
                    </div>
                    <div class="form-group">
                        <label>Promo Text</label>
                        <input type="text" id="promoText">
                    </div>

                    <button type="submit" id="saveSettingsBtn" class="btn-primary">Save Settings</button>
                    <p id="settingsStatus" class="status-msg"></p>
                </form>
            </section>

        </main>
    </div>

    <!-- ADD PRODUCT MODAL -->
    <div id="productModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Product</h3>
                <button id="closeModalBtn" class="close-btn">&times;</button>
            </div>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="pName" required>
                </div>
                <div class="form-group">
                    <label>Price (Tk)</label>
                    <input type="number" id="pPrice" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="pCategory">
                        <option value="high">High Tops</option>
                        <option value="low">Low Tops</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Sizes (comma separated)</label>
                    <input type="text" id="pSizes" placeholder="e.g. 7, 8, 9, 10" required>
                </div>
                <div class="form-group">
                    <label>Colors (comma separated Hex Codes)</label>
                    <input type="text" id="pColors" placeholder="e.g. #000000, #ffffff" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="pDesc" rows="3" required></textarea>
                </div>
                <div class="form-group row-group">
                    <label>Visible on Store</label>
                    <input type="checkbox" id="pVisible" checked>
                </div>
                <div class="form-group">
                    <label>Product Image</label>
                    <input type="file" id="pImageInput" accept="image/*">
                    <small>Required for new products. Leave blank to keep existing.</small>
                </div>
                <button type="submit" id="saveProductBtn" class="btn-primary">Save Product</button>
            </form>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
